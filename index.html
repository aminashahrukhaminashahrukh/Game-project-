<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esports Arena - Premium Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #030305;
            overflow: hidden;
            position: relative;
        }

        /* Ultimate Branded Premium Background Elements */
        .bg-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0;
        }

        body::before {
            content: '';
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.25) 0%, transparent 70%);
            top: -5%;
            left: -5%;
            filter: blur(80px);
            animation: floatGlow 8s infinite alternate;
        }

        body::after {
            content: '';
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(255, 0, 127, 0.2) 0%, transparent 70%);
            bottom: -5%;
            right: -5%;
            filter: blur(80px);
            animation: floatGlow 8s infinite alternate-reverse 4s;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.2); }
        }

        /* Ultra Premium Glassmorphism Box */
        .login-card {
            position: relative;
            width: 420px;
            padding: 45px;
            background: rgba(8, 9, 15, 0.75);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.1), inset 0 0 20px rgba(255, 255, 255, 0.02);
            z-index: 1;
            backdrop-filter: blur(20px);
            transition: all 0.4s ease;
        }

        .login-card:hover {
            border-color: rgba(255, 0, 127, 0.4);
            box-shadow: 0 0 50px rgba(255, 0, 127, 0.15);
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .brand-logo h2 {
            color: #fff;
            font-size: 2.3em;
            font-weight: 800;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #00f0ff, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.3));
        }

        .brand-logo p {
            color: #666;
            font-size: 11px;
            letter-spacing: 3px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* Input Fields VIP Style */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #00f0ff;
            background: rgba(0, 240, 255, 0.02);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
        }

        .input-group label {
            position: absolute;
            top: 50%;
            left: 16px;
            transform: translateY(-50%);
            color: #666;
            font-size: 14px;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -10px;
            left: 10px;
            font-size: 11px;
            color: #00f0ff;
            background: #08090f;
            padding: 2px 8px;
            border-radius: 4px;
            letter-spacing: 1px;
        }

        .actions-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .forgot-link {
            color: #666;
            text-decoration: none;
            font-size: 12px;
            transition: 0.3s;
        }

        .forgot-link:hover {
            color: #ff007f;
        }

        /* Main Branded Button */
        .btn-prime {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #00f0ff, #ff007f);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.3);
        }

        .btn-prime:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 0, 127, 0.5);
            letter-spacing: 4px;
        }

        /* Divider Line */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #444;
            font-size: 11px;
            letter-spacing: 1px;
            margin: 25px 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        /* Social Auth Buttons (Google & Facebook) */
        .social-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-social:hover {
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
            transform: translateY(-1px);
        }

        .btn-google:hover {
            border-color: #ea4335;
            box-shadow: 0 0 15px rgba(234, 67, 53, 0.15);
        }

        .btn-facebook:hover {
            border-color: #1877f2;
            box-shadow: 0 0 15px rgba(24, 119, 242, 0.15);
        }

        .btn-social svg {
            width: 18px;
            height: 18px;
        }

        .footer-text {
            text-align: center;
            color: #555;
            font-size: 12px;
            margin-top: 30px;
        }

        .footer-text a {
            color: #00f0ff;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            text-shadow: 0 0 5px #00f0ff;
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="login-card">
        <div class="brand-logo">
            <h2>NEXUS CORE</h2>
            <p>Next-Gen Gaming Network</p>
        </div>

        <form onsubmit="event.preventDefault(); alert('🚀 Loading Server Profiles...');">
            <div class="input-group">
                <input type="text" required>
                <label>Gamer ID / Email</label>
            </div>
            
            <div class="input-group">
                <input type="password" required>
                <label>Access Password</label>
            </div>

            <div class="actions-row">
                <a href="#" class="forgot-link" onclick="alert('Reset instruction sent to secure terminal.')">Forgot Key?</a>
            </div>

            <button type="submit" class="btn-prime">LAUNCH IDENTITY</button>

            <div class="divider">SECURE INTEGRATION</div>

            <div class="social-container">
                <!-- Google Button -->
                <button type="button" class="btn-social btn-google" onclick="alert('🌐 Connecting with Google Secure Gateway...')">
                    <svg viewBox="0 0 24 24">
                        <path fill="#EA4335" d="M12 5.04c1.64 0 3.12.56 4.28 1.67l3.2-3.2C17.52 1.58 14.96 1 12 1 7.35 1 3.41 3.66 1.49 7.55l3.78 2.93c.89-2.67 3.39-4.44 6.73-4.44z"/>
                        <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.36H12v4.51h6.46c-.28 1.48-1.12 2.74-2.38 3.58l3.7 2.87c2.16-1.99 3.41-4.92 3.41-8.6z"/>
                        <path fill="#FBBC05" d="M5.27 14.42c-.23-.69-.36-1.42-.36-2.18s.13-1.49.36-2.18L1.49 7.13C.54 9.03 0 11.16 0 13.4s.54 4.37 1.49 6.27l3.78-2.93z"/>
                        <path fill="#34A853" d="M12 23c3.24 0 5.97-1.07 7.96-2.91l-3.7-2.87c-1.03.69-2.35 1.11-4.26 1.11-3.34 0-5.84-1.77-6.73-4.44L1.49 16.82C3.41 20.71 7.35 23 12 23z"/>
                    </svg>
                    Continue with Google
                </button>

                <!-- Facebook Button -->
                <button type="button" class="btn-social btn-facebook" onclick="alert('🔵 Connecting with Facebook Authorization Sync...')">
                    <svg viewBox="0 0 24 24" fill="#1877F2">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    Continue with Facebook
                </button>
            </div>

            <div class="footer-text">
                New Operative? <a href="#" onclick="alert('Opening Account Registration Protocol...')">Create Account</a>
            </div>
        </form>
    </div>

</body>
</html>
